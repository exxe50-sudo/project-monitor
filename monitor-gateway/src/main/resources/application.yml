server:
  port: 8080
spring:
  application:
    name: monitor-gateway
  cloud:
    gateway:
      routes:
        - id: monitor-server
          uri: http://monitor-server:8081
          predicates:
            - Path=/api/**
        - id: monitor-server-ws
          uri: http://monitor-server:8081
          predicates:
            - Path=/ws/**
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
  data:
    redis:
      host: localhost
      port: 6379
app:
  jwt:
    secret: monitor-jwt-secret-key-must-be-at-least-256-bits-long
    expiration: 86400000
