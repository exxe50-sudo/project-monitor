spring:
  application:
    name: monitor-agent
server:
  port: 0
agent:
  collector-host: localhost
  collector-port: 9090
  agent-id: auto
  heartbeat-interval: 5
  metrics:
    cpu:
      interval: 30
    memory:
      interval: 30
    disk:
      interval: 60
    network:
      interval: 30
    process:
      interval: 60
    port:
      interval: 30
