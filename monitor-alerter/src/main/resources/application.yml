server:
  port: 8083
spring:
  application:
    name: monitor-alerter
  datasource:
    url: jdbc:postgresql://localhost:5432/monitor
    username: monitor
    password: monitor123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  mail:
    host: smtp.example.com
    port: 587
    username: alerts@example.com
    password: mailpass
app:
  alert:
    suppression-interval-seconds: 300
    evaluation-window-minutes: 5
    recovery-check-cron: "0 */1 * * * ?"
