syntax = "proto3";

package monitor.agent;

option java_multiple_files = true;
option java_package = "com.monitor.collector.grpc.proto";
option java_outer_classname = "MetricReportProto";

message RegisterRequest {
  string agent_id = 1;
  string hostname = 2;
  string ip_address = 3;
  string os_type = 4;
  string os_version = 5;
  string agent_version = 6;
  map<string, string> labels = 7;
}

message RegisterResponse {
  string node_id = 1;
  int32 collect_interval = 2;
  repeated string enabled_items = 3;
  string server_time = 4;
  // 系统详细信息
  SystemInfo system_info = 5;
  // 分配的告警模板
  repeated string assigned_templates = 6;
}

// 系统详细信息
message SystemInfo {
  string hostname = 1;
  string os_type = 2;
  string os_version = 3;
  string os_arch = 4;
  int32 cpu_cores = 5;
  int64 total_memory_bytes = 6;
  int64 total_disk_bytes = 7;
  string agent_version = 8;
  repeated string network_interfaces = 9;
  repeated DiskInfo disks = 10;
}

// 磁盘信息
message DiskInfo {
  string mount_point = 1;
  string filesystem = 2;
  int64 total_bytes = 3;
  int64 used_bytes = 4;
  int64 available_bytes = 5;
}

message Metric {
  string item_key = 1;
  double value = 2;
  map<string, string> tags = 3;
}

message MetricReport {
  string agent_id = 1;
  int64 timestamp = 2;
  string node_id = 3;
  repeated Metric metrics = 4;
}

message MetricAck {
  int32 received_count = 1;
  string server_time = 2;
  repeated string adjust_items = 3;
}

message HeartbeatInfo {
  double cpu_util = 1;
  double mem_used_pct = 2;
  double disk_used_pct = 3;
  string agent_status = 4;
}

message Heartbeat {
  string agent_id = 1;
  int64 timestamp = 2;
  string node_id = 3;
  HeartbeatInfo info = 4;
}

message HeartbeatAck {
  string server_time = 1;
}

service AgentService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc ReportMetrics(stream MetricReport) returns (stream MetricAck);
  rpc HeartbeatStream(stream Heartbeat) returns (stream HeartbeatAck);
}
