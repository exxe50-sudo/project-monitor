server:
  port: 8081
spring:
  application:
    name: monitor-server
  datasource:
    url: jdbc:postgresql://localhost:5432/monitor
    username: monitor
    password: monitor123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379
      password:
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
app:
  jwt:
    secret: monitor-jwt-secret-key-must-be-at-least-256-bits-long
    expiration: 86400000
  websocket:
    allowed-origins: "*"
